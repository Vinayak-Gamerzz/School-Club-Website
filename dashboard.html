<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dashboard - Nova Club</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
  background:#050505;
  color:white;
  margin:0;
  font-family:'Inter',sans-serif;
  padding-top:80px;
}

/* HEADER */
.header{
  padding:30px 40px 10px;
}

.welcome-text{
  font-size:36px;
  margin-bottom:20px;
  background:linear-gradient(90deg,#00ffc8,#00aaff,#ff00cc);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* BUTTON */
.add{
  padding:10px 20px;
  border-radius:25px;
  background:linear-gradient(90deg,#00ffc8,#00aaff);
  color:black;
  cursor:pointer;
  border:none;
}

/* BACK BUTTON FIX */
.back-btn{
  position:static;
  margin:20px 40px;
}

/* LAYOUT */
.layout{
  display:grid;
  grid-template-columns:2fr 1fr;
  gap:30px;
  padding:30px 40px;
}

/* BOX */
.card{
  background:#111;
  padding:18px;
  border-radius:14px;
  margin-top:10px;
}

/* PROJECT CARD */
.pcard{
  background:#1a1a1a;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

/* BADGES */
.badges{
  display:flex;
  flex-wrap:wrap;
}

.badge{
  width:65px;
  height:65px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:6px;
  background:radial-gradient(circle,#00ffc8,#00aaff);
  color:black;
}

/* FORM */
.hidden{ display:none; }

input, select{
  width:100%;
  margin-bottom:10px;
  padding:10px;
  background:#1a1a1a;
  border:none;
  color:white;
  border-radius:8px;
}
</style>

</head>

<body>

<nav class="navbar">
  <a href="index.html" class="logo">
  <img src="assets/images/elyra-logo.png" class="logo-img">
  <span class="logo-text">ELYRA</span>
</a>
</nav>

<button class="back-btn" onclick="goBack()">← Back</button>

<div class="header">
  <h1 id="welcome" class="welcome-text">Welcome</h1>

  <button class="add" onclick="toggleForm()">➕ Add Project</button>
</div>

<!-- FORM -->
<div id="form" class="card hidden" style="margin:0 40px;">
  <input id="pTitle" placeholder="Project Title">
  <input id="pGithub" placeholder="GitHub Repo">
  <input id="pDemo" placeholder="Live Demo">
  <input id="pDesc" placeholder="Description">

  <select id="pStatus">
    <option value="current">Current</option>
    <option value="completed">Completed</option>
  </select>

  <button class="add" onclick="submitProject()">Submit</button>
</div>

<div class="layout">

<!-- LEFT -->
<div>

  <h2>🟢 Current Projects</h2>
  <div id="currentProjects" class="card"></div>

  <h2>🔵 Completed Projects</h2>
  <div id="completedProjects" class="card"></div>

  <h2>🏅 Badges</h2>
  <div id="badges" class="card badges"></div>

</div>

<!-- RIGHT -->
<div>

  <div class="card">
    <h3>🔥 Streak</h3>
    <p id="streak"></p>
  </div>

  <div class="card">
    <h3>💬 Quote</h3>
    <p id="quote"></p>
  </div>

  <div class="card">
    <h3>👤 You</h3>
    <p id="qName"></p>
    <button class="add" onclick="editProfile()">Open Profile</button>
  </div>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const app = initializeApp({
  apiKey:"AIzaSyDi1ND91tW2RP23926SoY6j9GX9vKGCSOQ",
  authDomain:"nova-club-vinayak.firebaseapp.com",
  projectId:"nova-club-vinayak"
});

const auth=getAuth(app);
const db=getFirestore(app);

/* TOGGLE */
window.toggleForm = ()=>form.classList.toggle("hidden");

/* ADD PROJECT */
window.submitProject = async()=>{
  const user=auth.currentUser;

  await addDoc(collection(db,"members",user.uid,"projects"),{
    title:pTitle.value,
    github:pGithub.value,
    demo:pDemo.value,
    desc:pDesc.value,
    status:pStatus.value
  });

  location.reload();
};

/* STREAK */
const streakVal = parseInt(localStorage.getItem("streak")||"1");
streak.innerText = streakVal + " days";

/* QUOTE */
const quotes=["Consistency wins","Stay disciplined","Build daily","Focus up","Keep improving"];
quote.innerText = quotes[new Date().getHours()%quotes.length];

/* MAIN */
onAuthStateChanged(auth, async(user)=>{

if(!user) return location.href="login.html";

const snapUser = await getDoc(doc(db,"members",user.uid));
const data = snapUser.data() || {};

welcome.innerText = "Welcome " + (data.name || "User") + " 👋";
qName.innerText = data.name || "User";

/* PROJECTS */
const snap = await getDocs(collection(db,"members",user.uid,"projects"));

let count=0, completed=0;

snap.forEach(d=>{
const p=d.data();
count++;

const div=document.createElement("div");
div.className="pcard";
div.innerHTML=`${p.title}<br><a href="${p.github}" target="_blank">GitHub</a>`;

if(p.status==="current"){
currentProjects.appendChild(div);
}else{
completed++;
completedProjects.appendChild(div);
}
});

/* BADGES */
let badgesArr=[];

if(count>=1) badgesArr.push("🚀");
if(count>=3) badgesArr.push("⚡");
if(completed>=1) badgesArr.push("✅");
if(streakVal>=3) badgesArr.push("🔥");

badges.innerHTML = badgesArr.map(b=>`<div class="badge">${b}</div>`).join("");

});

/* NAV */
window.logout = async()=>{
await signOut(auth);
location.href="index.html";
};

window.editProfile = ()=>location.href="profile.html";
window.goBack = ()=>location.href="index.html";

</script>

</body>
</html>
