    body {

    select[multiple] {

<!-- FORM -->
<div class="container">
  <div class="box">

    <h2>Join Elyra Club</h2>

    <form id="joinForm">

  <input type="text" id="name" placeholder="Full Name" required>
  <input type="email" id="email" placeholder="Email" required>
  <input type="password" id="password" placeholder="Password" required>
  <input type="text" id="class" placeholder="Class" required>
  <input type="text" id="phone" placeholder="Phone" required>

  <!-- 🔥 MULTI SELECT -->
<p class="skills-title">Choose Your Skills</p>

<div class="skills-box">

  <label class="skill-card">
    <input type="checkbox" value="web">
    <span>💻 Web Development</span>
  </label>

  <label class="skill-card">
    <input type="checkbox" value="app">
    <span>📱 App Development</span>
  </label>

  <label class="skill-card">
    <input type="checkbox" value="game">
    <span>🎮 Game Development</span>
  </label>

  <label class="skill-card">
    <input type="checkbox" value="robotics">
    <span>🤖 Robotics</span>
  </label>

</div>

  <button type="submit">Join</button>

</form>

    <p id="msg"></p>

  </div>
</div>

<!-- FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, setDoc, doc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDi1ND91tW2RP23926SoY6j9GX9vKGCSOQ",
  authDomain: "nova-club-vinayak.firebaseapp.com",
  projectId: "nova-club-vinayak",
  storageBucket: "nova-club-vinayak.firebasestorage.app",
  messagingSenderId: "515398263626",
  appId: "1:515398263626:web:bbf69430e0f960f48617b3",
  measurementId: "G-4HTH6SLMTG"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const form = document.getElementById("joinForm");

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  const name = document.getElementById("name").value;
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;
  const className = document.getElementById("class").value;
  const phone = document.getElementById("phone").value;

  /* 🔥 MULTI SKILLS */
  const skillOptions = document.getElementById("skills");
 const skills = Array.from(document.querySelectorAll(".skills-box input:checked"))
  .map(el => el.value);

try {
  const userCred = await createUserWithEmailAndPassword(auth, email, password);

  await setDoc(doc(db, "members", userCred.user.uid), {
    name,
    email,
    className,
    phone,
    skills
  });

  /* 🔥 YE ADD KAR (IMPORTANT) */
  localStorage.setItem("type", "join");
  window.location.href = "success.html";

} catch (error) {
  document.getElementById("msg").innerText = error.message;
}
});

</script>

<script type="module" src="js/auth.js"></script>

</body>
