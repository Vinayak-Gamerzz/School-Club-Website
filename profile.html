<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Profile - Nova Club</title>

<link rel="stylesheet" href="css/style.css">

<style>

body{
  background:#050505;
  color:white;
  font-family:'Nunito',sans-serif;
  padding-top:80px;
}

/* MAIN */
.container{
  max-width:700px;
  margin:100px auto;
}

/* CARD */
.profile-card{
  background:rgba(20,20,20,0.7);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:20px;
  text-align:center;
}

/* AVATAR */
.avatar{
  width:120px;
  height:120px;
  border-radius:50%;
  object-fit:cover;
  margin-bottom:15px;
  border:3px solid #00ffc8;
}

/* INFO */
.info p{
  margin:6px 0;
}

/* BUTTON */
.btn{
  margin-top:10px;
  padding:10px 20px;
  border-radius:25px;
  background:linear-gradient(90deg,#00ffc8,#00aaff);
  color:black;
  cursor:pointer;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-box{
  background:#111;
  padding:20px;
  border-radius:12px;
  width:300px;
}

.modal input{
  width:100%;
  margin-bottom:10px;
}

</style>

</head>

<body>

<nav class="navbar">
  <a href="index.html" class="logo">NOVA CLUB</a>
</nav>

<button class="back-btn" onclick="goBack()">← Back</button>

<div class="container">

  <div class="profile-card">

    <img id="avatar" class="avatar" src="https://via.placeholder.com/120">

    <h2 id="name">User</h2>
    <p id="username">@username</p>

    <div class="info">
      <p><b>Bio:</b> <span id="bio"></span></p>
      <p><b>Hobby:</b> <span id="hobby"></span></p>
      <p><b>Fav Food:</b> <span id="food"></span></p>
      <p><b>Goals:</b> <span id="goal"></span></p>
      <p><b>Skills:</b> <span id="skills"></span></p>
    </div>

    <button class="btn" onclick="openModal()">Edit Profile</button>

  </div>

</div>

<!-- MODAL -->
<div id="modal" class="modal">
  <div class="modal-box">

    <h3>Edit Profile</h3>

    <input id="eName" placeholder="Name">
    <input id="eUsername" placeholder="Username">
    <input id="eBio" placeholder="Bio">
    <input id="eHobby" placeholder="Hobby">
    <input id="eFood" placeholder="Fav Food">
    <input id="eGoal" placeholder="Goals">
    <input id="eSkills" placeholder="Skills (comma separated)">
    <input id="eAvatar" type="file">

    <button onclick="saveProfile()">Save</button>
    <button onclick="closeModal()">Cancel</button>

  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDi1ND91tW2RP23926SoY6j9GX9vKGCSOQ",
  authDomain: "nova-club-vinayak.firebaseapp.com",
  projectId: "nova-club-vinayak"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOAD */
onAuthStateChanged(auth, async(user)=>{

if(!user) return location.href="login.html";

const ref = doc(db,"members",user.uid);
const snap = await getDoc(ref);
const data = snap.data() || {};

/* DISPLAY */
name.innerText = data.name || "User";
username.innerText = "@"+(data.username||"username");
bio.innerText = data.bio || "-";
hobby.innerText = data.hobby || "-";
food.innerText = data.food || "-";
goal.innerText = data.goal || "-";
skills.innerText = data.skills || "-";

if(data.avatar){
  avatar.src = data.avatar;
}

});

/* MODAL */
window.openModal=()=>modal.style.display="flex";
window.closeModal=()=>modal.style.display="none";

/* SAVE */
window.saveProfile = async()=>{

const user = auth.currentUser;

let avatarURL="";

/* IMAGE BASE64 */
const file = eAvatar.files[0];

if(file){
  const reader = new FileReader();
  reader.onload = async function(){
    avatarURL = reader.result;

    await saveData(avatarURL);
  };
  reader.readAsDataURL(file);
}else{
  await saveData("");
}

};

async function saveData(avatarURL){

const user = auth.currentUser;

await setDoc(doc(db,"members",user.uid),{

name:eName.value,
username:eUsername.value,
bio:eBio.value,
hobby:eHobby.value,
food:eFood.value,
goal:eGoal.value,
skills:eSkills.value,
avatar:avatarURL || avatar.src

},{merge:true});

location.reload();
}

/* NAV */
window.goBack=()=>location.href="dashboard.html";

</script>

</body>
</html>
