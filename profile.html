.nav-links a {

  content: "";

/* DROPDOWN */
.dropdown {

}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(-8px);
  }
  to {
    opacity: 1;

}

.dropdown-menu li {

.dropdown-menu a {

<script>

// 🔥 LOAD OLD DATA
const data = JSON.parse(localStorage.getItem("elyra_profile")) || {};

for(let key in data){
  if(document.getElementById(key)){
    document.getElementById(key).value = data[key];
  }
}

// 🔥 SAVE
function saveProfile(){

  const profile = {
    username: document.getElementById("username").value,
    fullname: document.getElementById("fullname").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    dob: document.getElementById("dob").value,
    age: document.getElementById("age").value,
    food: document.getElementById("food").value,
    skill: document.getElementById("skill").value,
    sport: document.getElementById("sport").value,
    hobby: document.getElementById("hobby").value
  };

  localStorage.setItem("elyra_profile", JSON.stringify(profile));

  alert("Profile Saved ✅");
}

// 🔥 BACK
function goBack(){
  location.href="dashboard.html";
}

</script>


<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";

/* CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyDi1ND91tW2RP23926SoY6j9GX9vKGCSOQ",
  authDomain: "nova-club-vinayak.firebaseapp.com",
  projectId: "nova-club-vinayak"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* LOAD */
onAuthStateChanged(auth, async(user)=>{

if(!user) return location.href="login.html";

const ref = doc(db,"members",user.uid);
const snap = await getDoc(ref);
const data = snap.data() || {};

/* DISPLAY */
name.innerText = data.name || "User";
username.innerText = "@"+(data.username||"username");
bio.innerText = data.bio || "-";
hobby.innerText = data.hobby || "-";
food.innerText = data.food || "-";
goal.innerText = data.goal || "-";
skills.innerText = data.skills || "-";

if(data.avatar){
  avatar.src = data.avatar;
}

});

/* MODAL */
window.openModal=()=>modal.style.display="flex";
window.closeModal=()=>modal.style.display="none";

/* SAVE */
window.saveProfile = async()=>{

const user = auth.currentUser;

let avatarURL="";

/* IMAGE BASE64 */
const file = eAvatar.files[0];

if(file){
  const reader = new FileReader();
  reader.onload = async function(){
    avatarURL = reader.result;

    await saveData(avatarURL);
  };
  reader.readAsDataURL(file);
}else{
  await saveData("");
}

};

async function saveData(avatarURL){

const user = auth.currentUser;

await setDoc(doc(db,"members",user.uid),{

name:eName.value,
username:eUsername.value,
bio:eBio.value,
hobby:eHobby.value,
food:eFood.value,
goal:eGoal.value,
skills:eSkills.value,
avatar:avatarURL || avatar.src

},{merge:true});

location.reload();
}

/* NAV */
window.goBack=()=>location.href="dashboard.html";

</script>
